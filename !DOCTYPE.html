<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Ideal de Formación Docente</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para la interactividad desde el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        .animate-bounce-x {
            animation: bounce-x 1s infinite;
        }
        body {
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Iconos manual para evitar dependencias externas complejas
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState(0);

            const Illustrations = {
                Rectores: () => (
                    <svg viewBox="0 0 200 200" className="w-full h-full">
                        <circle cx="100" cy="100" r="80" fill="#EEF2FF" />
                        <path d="M100 40 L120 90 L170 90 L130 120 L145 170 L100 140 L55 170 L70 120 L30 90 L80 90 Z" fill="#6366F1" opacity="0.8" />
                        <circle cx="100" cy="100" r="30" fill="white" />
                        <path d="M85 100 L115 100 M100 85 L100 115" stroke="#4338CA" strokeWidth="4" strokeLinecap="round" />
                    </svg>
                ),
                Estrategias: () => (
                    <svg viewBox="0 0 200 200" className="w-full h-full">
                        <rect x="40" y="40" width="120" height="120" rx="20" fill="#FFFBEB" />
                        <circle cx="100" cy="80" r="25" fill="#F59E0B" opacity="0.3" />
                        <path d="M70 130 h60 M70 145 h40" stroke="#B45309" strokeWidth="6" strokeLinecap="round" />
                        <path d="M100 60 v40 M85 85 l30-10" stroke="#D97706" strokeWidth="4" strokeLinecap="round" />
                    </svg>
                ),
                Inclusion: () => (
                    <svg viewBox="0 0 200 200" className="w-full h-full">
                        <circle cx="70" cy="100" r="40" fill="#FFE4E6" />
                        <circle cx="130" cy="100" r="40" fill="#FFE4E6" />
                        <circle cx="100" cy="100" r="50" fill="#FECDD3" opacity="0.6" />
                        <path d="M100 85 c-10-10-25-10-25 5 0 15 25 30 25 30 s25-15 25-30 c0-15-15-15-25-5" fill="#E11D48" />
                    </svg>
                ),
                Tecnologia: () => (
                    <svg viewBox="0 0 200 200" className="w-full h-full">
                        <rect x="50" y="50" width="100" height="100" rx="10" fill="#ECFDF5" stroke="#10B981" strokeWidth="2" />
                        <circle cx="100" cy="100" r="30" fill="white" stroke="#059669" strokeWidth="2" />
                        <path d="M100 30 v20 M100 150 v20 M30 100 h20 M150 100 h20" stroke="#10B981" strokeWidth="4" strokeLinecap="round" />
                        <circle cx="100" cy="100" r="5" fill="#10B981" />
                    </svg>
                ),
                Evaluacion: () => (
                    <svg viewBox="0 0 200 200" className="w-full h-full">
                        <path d="M50 150 L80 100 L110 130 L150 60" fill="none" stroke="#0891B2" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" />
                        <circle cx="150" cy="60" r="10" fill="#22D3EE" />
                        <rect x="40" y="160" width="120" height="10" rx="5" fill="#CFFAFE" />
                    </svg>
                )
            };

            const sections = [
                {
                    title: "1. Principios Rectores",
                    icon: "shield-check",
                    color: "border-indigo-500",
                    bgColor: "bg-indigo-50",
                    textColor: "text-indigo-900",
                    illustration: <Illustrations.Rectores />,
                    description: "Valores fundamentales que guían el modelo hacia la excelencia humana y profesional.",
                    items: [
                        { label: "Inclusión Radical", text: "Garantizar que cada docente sea valorado por su singularidad y potencial." },
                        { label: "Ética de la Responsabilidad", text: "Compromiso con el impacto social de la enseñanza y la integridad académica." },
                        { label: "Innovación Crítica", text: "Búsqueda constante de mejora basada en la relevancia pedagógica." }
                    ]
                },
                {
                    title: "2. Estrategias de Enseñanza",
                    icon: "lightbulb",
                    color: "border-amber-500",
                    bgColor: "bg-amber-50",
                    textColor: "text-amber-900",
                    illustration: <Illustrations.Estrategias />,
                    description: "Metodologías activas para una formación que trasciende la simple teoría.",
                    items: [
                        { label: "Práctica Reflexiva", text: "Análisis sistemático de la propia labor (Docente como profesional reflexivo)." },
                        { label: "Aprendizaje Basado en Retos", text: "Resolución de problemáticas reales del entorno escolar inmediato." },
                        { label: "Aula Invertida Docente", text: "Optimización del tiempo presencial para el debate y la creación." }
                    ]
                },
                {
                    title: "3. Perspectiva Inclusiva y Ética",
                    icon: "heart",
                    color: "border-rose-500",
                    bgColor: "bg-rose-50",
                    textColor: "text-rose-900",
                    illustration: <Illustrations.Inclusion />,
                    description: "Fomento de la equidad, el respeto a la diversidad y la perspectiva de género.",
                    items: [
                        { label: "Equidad de Género", text: "Eliminación de sesgos en materiales y dinámicas de interacción." },
                        { label: "Diseño Universal (DUA)", text: "Atención a todos los ritmos y estilos de aprendizaje de los docentes." },
                        { label: "Interculturalidad", text: "Reconocimiento y valoración de los saberes locales y diversos." }
                    ]
                },
                {
                    title: "4. Integración Tecnológica",
                    icon: "cpu",
                    color: "border-emerald-500",
                    bgColor: "bg-emerald-50",
                    textColor: "text-emerald-900",
                    illustration: <Illustrations.Tecnologia />,
                    description: "Aprovechamiento de las TIC y TAC para potenciar el aprendizaje continuo.",
                    items: [
                        { label: "Alfabetización Digital Crítica", text: "Uso de herramientas para crear conocimiento, no solo consumirlo." },
                        { label: "Entornos de Aprendizaje (EVA)", text: "Plataformas colaborativas que eliminan barreras geográficas." },
                        { label: "IA Ética en Educación", text: "Integración de IA para la personalización y apoyo administrativo." }
                    ]
                },
                {
                    title: "5. Evaluación de Competencias",
                    icon: "clipboard-check",
                    color: "border-cyan-500",
                    bgColor: "bg-cyan-50",
                    textColor: "text-cyan-900",
                    illustration: <Illustrations.Evaluacion />,
                    description: "Métodos para medir el crecimiento profesional y el desarrollo de habilidades.",
                    items: [
                        { label: "Evaluación Formativa", text: "Retroalimentación continua centrada en el proceso de aprendizaje." },
                        { label: "E-Portafolios", text: "Evidencia tangible del progreso y reflexión a lo largo del tiempo." },
                        { label: "Evaluación 360°", text: "Percepción de pares, alumnos y autoevaluación integral." }
                    ]
                }
            ];

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-6xl mx-auto">
                        <header className="relative bg-white rounded-3xl shadow-xl overflow-hidden mb-12 border border-slate-200">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-rose-500 to-emerald-500" />
                            <div className="flex flex-col md:flex-row items-center p-8 md:p-12">
                                <div className="md:w-2/3 text-center md:text-left z-10">
                                    <span className="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-700 font-bold text-xs mb-4 tracking-widest uppercase">Propuesta Educativa 2026</span>
                                    <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-4 leading-tight">Modelo <span className="text-indigo-600">Ideal</span> de Formación Docente</h1>
                                    <p className="text-slate-500 text-lg max-w-xl leading-relaxed">Una arquitectura pedagógica centrada en el ser humano, la tecnología ética y la reflexión constante.</p>
                                </div>
                                <div className="md:w-1/3 mt-8 md:mt-0 flex justify-center">
                                    <div className="w-40 h-40 bg-indigo-50 rounded-full flex items-center justify-center relative">
                                        <div className="absolute inset-0 border-4 border-indigo-200 border-dashed rounded-full animate-spin-slow" />
                                        <Icon name="users" className="w-16 h-16 text-indigo-500" />
                                    </div>
                                </div>
                            </div>
                        </header>

                        <div className="flex flex-wrap justify-center gap-3 mb-10">
                            {sections.map((s, i) => (
                                <button key={i} onClick={() => setActiveSection(i)} className={`px-6 py-3 rounded-2xl font-bold transition-all duration-300 flex items-center space-x-2 ${activeSection === i ? `${s.bgColor} ${s.textColor} shadow-md ring-2 ring-offset-2 ring-slate-200 scale-105` : 'bg-white text-slate-500 hover:bg-slate-100 border border-slate-200'}`}>
                                    <Icon name={s.icon} className="w-5 h-5" />
                                    <span className="hidden sm:inline">{s.title.split('.')[1]}</span>
                                    <span className="sm:hidden">{i + 1}</span>
                                </button>
                            ))}
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[500px] border border-slate-100">
                            <div className="grid md:grid-cols-2 h-full">
                                <div className={`p-12 flex flex-col items-center justify-center text-center ${sections[activeSection].bgColor} transition-colors duration-500`}>
                                    <div className="w-64 h-64 mb-8 transform hover:scale-110 transition-transform duration-500">
                                        {sections[activeSection].illustration}
                                    </div>
                                    <h2 className={`text-3xl font-black mb-4 ${sections[activeSection].textColor}`}>{sections[activeSection].title}</h2>
                                    <p className="text-slate-600 font-medium max-w-sm">{sections[activeSection].description}</p>
                                </div>
                                <div className="p-8 md:p-12 flex flex-col justify-center">
                                    <div className="space-y-8">
                                        {sections[activeSection].items.map((item, idx) => (
                                            <div key={idx} className="flex group">
                                                <div className="mr-6">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-lg ${sections[activeSection].color.replace('border', 'bg')}`}>{idx + 1}</div>
                                                </div>
                                                <div>
                                                    <h4 className="text-xl font-bold text-slate-800 mb-2 group-hover:text-indigo-600 transition-colors">{item.label}</h4>
                                                    <p className="text-slate-500 leading-relaxed text-base">{item.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-12 flex items-center text-slate-400 text-sm font-bold uppercase tracking-widest">
                                        <span>Explorar Contenido</span>
                                        <Icon name="arrow-right" className="ml-2 w-4 h-4 animate-bounce-x" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-16 bg-slate-900 rounded-3xl p-10 text-center text-white">
                            <h3 className="text-2xl font-black mb-4">Hacia una Nueva Identidad Docente</h3>
                            <p className="text-slate-400 max-w-2xl mx-auto leading-relaxed italic mb-8">"La formación no termina con un diploma; es el compromiso ético de transformarnos para transformar."</p>
                            <div className="flex justify-center space-x-4">
                                <span className="bg-slate-800 px-4 py-2 rounded-full text-xs font-bold text-slate-300">#Reflexión</span>
                                <span className="bg-slate-800 px-4 py-2 rounded-full text-xs font-bold text-slate-300">#TecnologíaÉtica</span>
                                <span className="bg-slate-800 px-4 py-2 rounded-full text-xs font-bold text-slate-300">#Inclusión</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
